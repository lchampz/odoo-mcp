services:
  odoo-crm-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      ODOO_URL: ${ODOO_URL}
      ODOO_DATABASE: ${ODOO_DATABASE}
      ODOO_USERNAME: ${ODOO_USERNAME}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
